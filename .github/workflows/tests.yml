# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: tests CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: ${{ matrix.package }} / ${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [16.x]
        # ironbean: per TS target a class-field emit (useDefineForClassFields),
        # ostatní balíčky mají vlastní jednotný test:no-watch
        include:
          - package: ironbean
            script: test:es5
          - package: ironbean
            script: test:es6
          - package: ironbean
            script: test:es2022
          - package: ironbean
            script: test:es2022-define
          - package: ironbean-jasmine
            script: test:no-watch
          - package: ironbean-jest
            script: test:no-watch
    defaults:
      run:
        working-directory: ./packages/${{ matrix.package }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - run: npm run build
    - run: npm run ${{ matrix.script }}
